on:
  push:
    branches:
      - 'develop'
      - 'bugfix/**'

name: Snapshot App

jobs:
  Package_app:
    name: Create Snapshot
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-15, windows-latest]
        python-version: ['3.12']
        include:
          - os: macos-15-intel
            label: macos-intel
            path: ~/Library/Caches/pip
          - os: macos-15
            label: macos-applesilicon
            path: ~/Library/Caches/pip
          - os: windows-latest
            label: windows
            path: ~\AppData\Local\pip\Cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt --extra-index-url https://${{ secrets.DEPLOY_GEMFURY_TOKEN }}:@pypi.fury.io/lcdp/
      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '11'
      - name: Prepare app
        run: python prepare.py
        env:
          APP_VERSION: ${{ github.ref_name }}
          LCDP_ENVIRONMENT: staging
          PROVIDER_HOST: api.lcdp.ovh
          IS_PROVIDER_SECURE: "True"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - run: python -m pip install pyinstaller
      - name: Compute safe branch name
        id: branch
        run: echo "safe=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - name: Package project
        run: python -m PyInstaller app.spec --distpath ./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app
      - name: Add macOS install script and README
        if: runner.os == 'macOS'
        run: |
          DIST="./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app"
          cp packaging/macos/install.command "$DIST/"
          cp packaging/macos/LISEZ-MOI.txt "$DIST/"
          chmod +x "$DIST/install.command"
      - name: Zip project
        run: 7z a ${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app.zip ./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app/*
      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: snapshot-${{ github.run_id }}
          tag: ${{ github.run_id }}-snapshot
          prerelease: true
          commit: ${{ github.sha }}
          artifacts: ${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true