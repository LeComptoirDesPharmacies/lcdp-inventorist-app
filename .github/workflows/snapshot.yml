on:
  push:
    branches:
      - 'develop'
      - 'bugfix/**'

name: Snapshot App

jobs:
  Package_app:
    name: Create Snapshot
    runs-on: ${{ matrix.os }}
    # Supply-chain policy (LDS-5825): deps come from uv.lock via `uv sync --frozen`
    # (age gate frozen in at lock time, see pyproject.toml [tool.uv]); aikido-uv adds
    # malware scanning. NO_PROXY lets fury bypass the MITM proxy; UV_INDEX_FURY_*
    # authenticates the gemfury index for internal packages.
    env:
      NO_PROXY: "lcdp.fury.site,pypi.fury.io"
      no_proxy: "lcdp.fury.site,pypi.fury.io"
      PIP_DEFAULT_TIMEOUT: "180"
      AIKIDO_SCAN_TIMEOUT_MS: "180000"
      UV_INDEX_FURY_USERNAME: ${{ secrets.DEPLOY_GEMFURY_TOKEN }}
      UV_INDEX_FURY_PASSWORD: ""
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-15, windows-latest]
        python-version: ['3.12']
        include:
          - os: macos-15-intel
            label: macos-intel
          - os: macos-15
            label: macos-applesilicon
          - os: windows-latest
            label: windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install safe-chain
        run: npm install -g @aikidosec/safe-chain@1.5.7
      - name: Install dependencies
        # Installs uv.lock exactly (age gate already frozen in); aikido-uv scans for malware.
        run: aikido-uv sync --frozen
      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '11'
      - name: Prepare app
        run: uv run python prepare.py
        env:
          APP_VERSION: ${{ github.ref_name }}
          LCDP_ENVIRONMENT: staging
          PROVIDER_HOST: api.lcdp.ovh
          IS_PROVIDER_SECURE: "True"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Compute safe branch name
        id: branch
        run: echo "safe=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - name: Package project
        run: uv run pyinstaller app.spec --distpath ./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app
      - name: Add macOS install script and README
        if: runner.os == 'macOS'
        run: |
          DIST="./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app"
          cp packaging/macos/install.command "$DIST/"
          cp packaging/macos/LISEZ-MOI.txt "$DIST/"
          chmod +x "$DIST/install.command"
      - name: Zip project
        run: 7z a ${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app.zip ./${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app/*
      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: snapshot-${{ github.run_id }}
          tag: ${{ github.run_id }}-snapshot
          prerelease: true
          commit: ${{ github.sha }}
          artifacts: ${{ matrix.label }}-${{ steps.branch.outputs.safe }}-app.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
