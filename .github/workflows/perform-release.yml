name: perform-release

# Must be triggered from a release/v* branch.
# merge into main → tag → delete release branch → merge main into develop → build & publish app.

on:
  workflow_dispatch:

jobs:
  git-release:
    name: Git release flow (merge → tag → back-merge)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Validate branch name
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^release/v.+ ]]; then
            echo "::error::This workflow must be triggered from a release/v* branch (got: ${{ github.ref_name }})"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main:main develop:develop

      - name: Extract release version
        id: version
        run: |
          RELEASE_BRANCH="${{ github.ref_name }}"
          NEW_VERSION="${RELEASE_BRANCH#release/}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge release branch into main and tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          RELEASE_BRANCH="${{ steps.version.outputs.release_branch }}"
          git checkout main
          git merge "$RELEASE_BRANCH" -m "Merge $RELEASE_BRANCH into main"
          git push origin main
          git tag -a -m "Tagging for release $NEW_VERSION" "$NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Delete release branch
        run: git push origin --delete "${{ steps.version.outputs.release_branch }}"

      - name: Merge main back into develop
        run: |
          git checkout develop
          git merge main -m "Merge main into develop after release ${{ steps.version.outputs.new_version }}"
          git push origin develop

  build-and-publish:
    name: Build and publish release
    needs: git-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            label: macos-intel
            path: ~/Library/Caches/pip
          - os: macos-14
            label: macos-applesilicon
            path: ~/Library/Caches/pip
          - os: windows-latest
            label: windows
            path: ~\AppData\Local\pip\Cache
        python-version: ['3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.git-release.outputs.new_version }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --extra-index-url https://${{ secrets.DEV_DEPLOY_GEMFURY_TOKEN }}:@pypi.fury.io/lcdp-dev/ --extra-index-url https://${{ secrets.PROD_DEPLOY_GEMFURY_TOKEN }}:@pypi.fury.io/lcdp/
      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '11'
      - name: Prepare app
        run: python prepare.py
        env:
          GITHUB_REF_NAME: ${{ needs.git-release.outputs.new_version }}
          LCDP_ENVIRONMENT: production
          PROVIDER_HOST: www.lecomptoirdespharmacies.fr
          IS_PROVIDER_SECURE: "True"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - run: pip install pyinstaller
      - name: Package project
        run: pyinstaller app.spec --distpath ./${{ matrix.label }}-${{ needs.git-release.outputs.new_version }}-app
        env:
          GITHUB_REF_NAME: ${{ needs.git-release.outputs.new_version }}
      - name: Zip project
        run: 7z a ${{ matrix.label }}-${{ needs.git-release.outputs.new_version }}-app.zip ./${{ matrix.label }}-${{ needs.git-release.outputs.new_version }}-app/*
      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.git-release.outputs.new_version }}
          artifacts: ${{ matrix.label }}-${{ needs.git-release.outputs.new_version }}-app.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
